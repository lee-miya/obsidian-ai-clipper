{% extends "base.html" %}
{% block content %}
<h1>剪藏列表</h1>
<table>
  <tr><th>标题</th><th>分类</th><th>状态</th><th>时间</th></tr>
  {% for job in jobs %}
  <tr>
    <td><a href="/web/clips/{{ job.id }}">{{ job.url }}</a></td>
    <td>{{ job.status }}</td>
    <td>{{ job.created_at }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
