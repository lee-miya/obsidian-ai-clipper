{% extends "base.html" %}
{% block title %}失败任务 - Obsidian AI Clipper{% endblock %}
{% block content %}
<h1>失败任务</h1>
<table>
  <tr><th>标题</th><th>状态</th><th>错误</th><th>时间</th></tr>
  {% for job in jobs %}
  <tr>
    <td><a href="/web/clips/{{ job.id }}">{{ job.url }}</a></td>
    <td>{{ job.status }}</td>
    <td>{{ job.last_error or '-' }}</td>
    <td>{{ job.created_at }}</td>
  </tr>
  {% endfor %}
</table>
<p><a href="/web">返回列表</a></p>
{% endblock %}
