<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Obsidian AI Clipper{% endblock %}</title>
  <style>
    :root {
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #666;
      --border: #e0e0e0;
      --accent: #2c5aa0;
      --accent-hover: #234b88;
      --success: #2e7d32;
      --warning: #e65100;
      --danger: #c62828;
      --tag-bg: #e3edf7;
      --tag-text: #2c5aa0;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      box-shadow: var(--shadow);
    }
    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      margin-right: auto;
      padding: 1rem 0;
    }
    nav { display: flex; gap: 0; }
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 1rem 1rem;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.25rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    th, td { padding: 0.75rem 1rem; text-align: left; }
    th {
      background: #f5f7fa;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border);
    }
    td { border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 0.2em 0.6em;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .badge-done    { background: #e8f5e9; color: var(--success); }
    .badge-pending { background: #fff3e0; color: var(--warning); }
    .badge-failed  { background: #ffebee; color: var(--danger); }
    .badge-review  { background: #e3f2fd; color: #1565c0; }
    .badge-default { background: #f5f5f5; color: #666; }

    .clip-url {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }

    /* detail page */
    .detail-card {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }
    .detail-card h2 {
      font-size: 1.35rem;
      margin-bottom: 0.25rem;
    }
    .detail-meta {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
      margin: 1.5rem 0;
      padding: 1.25rem;
      background: #fafbfd;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .meta-item label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
    }
    .meta-item span {
      font-size: 0.9rem;
      word-break: break-all;
    }
    .error-box {
      margin-top: 1rem;
      padding: 1rem;
      background: #fff5f5;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--danger);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--accent);
      font-size: 0.85rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.1em 0.55em;
      border-radius: 999px;
      font-size: 0.78rem;
      margin-right: 0.3rem;
    }

    @media (max-width: 640px) {
      header { flex-wrap: wrap; }
      nav a { padding: 0.6rem 0.75rem; font-size: 0.82rem; }
      main { margin: 1rem auto; padding: 0 1rem; }
      .clip-url { max-width: 180px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/web" class="logo">Obsidian AI Clipper</a>
    <nav>
      <a href="/web" class="{% if active_page == 'list' %}active{% endif %}">剪藏列表</a>
      <a href="/web/failed" class="{% if active_page == 'failed' %}active{% endif %}">失败任务</a>
      <a href="/web/queue" class="{% if active_page == 'queue' %}active{% endif %}">队列</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
